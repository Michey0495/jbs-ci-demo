name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: テスト実行 + カバレッジ
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80 tests/
